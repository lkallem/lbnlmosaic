title: Your Project
description: A description of your project.
theme: just-the-docs

baseurl: ""
url: "https://your-project.github.io" # Your GitHub Pages URL

# color_scheme: lbnl-dark   # LBNL Dark mode theme
color_scheme: lbnl-light    # LBNL Light mode theme

logo: "assets/logos/your-logo.png"
favicon_ico: "/assets/favicon/favicon.ico"

search_enabled: false
heading_anchors: true
enable_copy_code_button: true

# Footer last edited timestamp
last_edit_timestamp: true # show or hide edit time - page must have `last_modified_date` defined in the frontmatter
last_edit_time_format: "%Y %b %e at %H:%M %z" # uses ruby's time format: https://ruby-doc.org/stdlib-2.7.0/libdoc/time/rdoc/Time.html

# Links to appear at the top banner
aux_links:
  "Official CAG Site": https://amcr.lbl.gov/departments/computer-science-department/cag/
  "AMCR": https://amcr.lbl.gov/
  "LBNL": https://www.lbl.gov/
aux_links_new_tab: true

callouts:
  highlight:
    color: yellow
  important:
    title: Important
    color: blue
  new:
    title: New
    color: green
  note:
    title: Note
    color: purple
  warning:
    title: Warning
    color: red

plugins:
  - jekyll-email-protect

mermaid:
  # Version of mermaid library
  # Pick an available version from https://cdn.jsdelivr.net/npm/mermaid/
  version: "11.16.0"

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules
  - .gitignore
  - vendor/
  - node_modules/
  - templates/
